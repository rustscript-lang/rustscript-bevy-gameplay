name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target

jobs:
  rust:
    name: Rust lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: rustscript-bevy-gameplay
      - uses: actions/checkout@v4
        with:
          repository: rustscript-lang/rustscript
          path: rustscript
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config
      - name: Format check
        working-directory: rustscript-bevy-gameplay
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: rustscript-bevy-gameplay
        run: cargo clippy --all-targets
      - name: Tests
        working-directory: rustscript-bevy-gameplay
        run: cargo test --tests -- --skip gomoku_ai_self_play --skip xiangqi_ai_self_play
      - name: Example run
        working-directory: rustscript-bevy-gameplay
        run: cargo run --example combat
